<template x-for="product in iamProducts" :key="product.key">
  <button
    @click="activateIamProduct(product.key)"
    class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors"
    :class="isActiveIamProduct(product.key) ? 'bg-brand/20 text-blue-200' : 'text-gray-400 hover:text-white hover:bg-white/5'">
    <template x-if="product.icon === 'doc-gen'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 3.75h6l3 3v13.5H7.5a2.25 2.25 0 01-2.25-2.25V6A2.25 2.25 0 017.5 3.75z"/><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 3.75v4.5H18"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 13.5h6M9 16.5h4.5"/></svg>
    </template>
    <template x-if="product.icon === 'id-verification'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3.75 18.75 6v5.25c0 4.688-2.813 7.5-6.75 9-3.938-1.5-6.75-4.313-6.75-9V6L12 3.75z"/><path stroke-linecap="round" stroke-linejoin="round" d="m9.75 12 1.5 1.5 3-3"/></svg>
    </template>
    <template x-if="product.icon === 'monitor'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v17.25h16.5M7.5 15.75V12m4.5 3.75v-7.5m4.5 7.5V9"/></svg>
    </template>
    <template x-if="product.icon === 'notary'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 6.75h9v4.5h-9z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 11.25v3.75m6-3.75v3.75M6 18.75h12"/><path stroke-linecap="round" stroke-linejoin="round" d="M9.75 6.75V4.5h4.5v2.25"/></svg>
    </template>
    <template x-if="product.icon === 'web-forms'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 4.5h12A1.5 1.5 0 0119.5 6v12A1.5 1.5 0 0118 19.5H6A1.5 1.5 0 014.5 18V6A1.5 1.5 0 016 4.5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9h7.5M8.25 12h7.5M8.25 15h4.5"/></svg>
    </template>
    <template x-if="product.icon === 'workspaces'">
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 4.5h6.75v6.75H4.5zM12.75 4.5h6.75v6.75h-6.75zM4.5 12.75h6.75v6.75H4.5zM12.75 12.75h6.75v6.75h-6.75z"/></svg>
    </template>
    <span x-show="!sidebarCollapsed" x-text="product.label"></span>
  </button>
</template>
