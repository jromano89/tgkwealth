<section class="tgk-monitor-alert-panel">
  <div class="tgk-monitor-alert-panel__header">
    <div class="tgk-monitor-alert-panel__headline">
      <h3 class="tgk-monitor-alert-panel__title">Security Alerts</h3>
      <span class="tgk-monitor-live-dot"></span>
      <span class="tgk-monitor-alert-panel__status">Live</span>
    </div>
    <span class="tgk-monitor-alert-panel__source">Docusign Monitor API</span>
  </div>
  <div class="tgk-monitor-alert-list">
    <template x-for="alert in monitorAlerts" :key="alert.id">
      <div class="tgk-monitor-alert-row" :class="'tgk-monitor-alert-row--' + alert.severity">
        <div class="tgk-monitor-alert-row__main">
          <div class="tgk-monitor-severity-icon" :class="'tgk-monitor-severity-icon--' + alert.severity">
            <template x-if="alert.severity === 'critical'">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/></svg>
            </template>
            <template x-if="alert.severity === 'high'">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z"/></svg>
            </template>
            <template x-if="alert.severity === 'medium'">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/></svg>
            </template>
          </div>
          <div class="tgk-monitor-alert-row__content">
            <div class="tgk-monitor-alert-row__heading">
              <span class="tgk-monitor-alert-row__title" x-text="alert.title"></span>
              <span :class="'tgk-monitor-severity-badge tgk-monitor-severity-badge--' + alert.severity" x-text="alert.severity"></span>
            </div>
            <div class="tgk-monitor-alert-row__copy" x-text="alert.description"></div>
            <div class="tgk-monitor-alert-row__time">
              <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
              <span x-text="monitorTimeAgo(alert.timestamp)"></span>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>
</section>
