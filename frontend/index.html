<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TGK Portal Platform</title>
  <meta name="description" content="Docusign IAM portal generation platform — launch and manage demo portal instances.">
  <meta name="theme-color" content="#18003d">
  <link rel="icon" href="shared/favicon.ico" sizes="any">
  <link rel="stylesheet" href="shared/styles/tgk-brand.css?v=20260408-1">
  <link rel="stylesheet" href="shared/styles/tgk-launcher.css?v=20260408-1">
  <script defer src="config.js"></script>
  <script defer src="shared/js/tgk-launcher.js?v=20260408-1"></script>
</head>
<body>
  <main class="page-shell">
    <div class="experience-frame">
      <section class="hero">
        <div class="hero-inner">
          <div class="brand-pill" aria-hidden="true">
            <img class="brand-logo" src="shared/docusign-logo-white.svg" alt="">
          </div>

          <div class="hero-copy-block">
            <div class="hero-kicker">TGK Portal Platform</div>
            <h1>
              <span class="hero-accent-iam">IAM</span> Story Demo Experience
            </h1>
            <p id="hero-copy">
              Select a portal instance and workflow to launch.
            </p>
          </div>
        </div>
      </section>

      <section class="configurator">
        <section class="configurator-section" data-group="instance">
          <p class="section-label">Select Portal Instance</p>
          <div id="instance-grid" class="option-grid" data-columns="3">
            <div class="launcher-loading">Loading instances...</div>
          </div>
        </section>

        <section class="configurator-section" data-group="workflow">
          <p class="section-label">Select Core Workflow</p>
          <div class="option-grid" data-columns="2">
            <button class="option-card is-selected" type="button" data-option="workflow" data-value="onboarding" aria-pressed="true">
              <span class="card-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <circle cx="12" cy="8" r="3.2" stroke="currentColor" stroke-width="1.6"/>
                  <path d="M6.5 18c1.3-3.1 3.4-4.6 5.5-4.6s4.2 1.5 5.5 4.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="card-copy">
                <span class="card-title" id="onboarding-label">Onboarding</span>
                <span class="card-subtitle" id="onboarding-subtitle">New account opening, KYC, forms</span>
              </span>
            </button>

            <button class="option-card" type="button" data-option="workflow" data-value="maintenance">
              <span class="card-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none">
                  <path d="m9.1 7.4 7.5 7.5M7.3 16.7l3.4-3.4M13.1 10.9l3.4-3.4M4.8 19.2l2.1-2.1M17 6.7l2.2-2.2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                  <path d="M13.7 6.5 17.5 10.3" stroke="#FF5252" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
              </span>
              <span class="card-copy">
                <span class="card-title" id="maintenance-label">Maintenance</span>
                <span class="card-subtitle" id="maintenance-subtitle">Address changes, beneficiaries, transfers</span>
              </span>
            </button>
          </div>
        </section>

        <section class="launch-panel">
          <a id="generate-demo-link" class="launch-cta" href="advisor/">
            <span id="generate-demo-label">Launch Portal -&gt;</span>
          </a>

          <div class="footer-meta">
            <div class="footer-note">Multi-instance portal platform • Config-driven per vertical</div>
            <div class="footer-links">
              <a id="configurable-portal-link" href="advisor/?mode=advanced">SC configurable portal</a>
              <span class="footer-sep">•</span>
              <a href="wizard/">Create new instance</a>
            </div>
          </div>
        </section>
      </section>
    </div>
  </main>

</body>
</html>
